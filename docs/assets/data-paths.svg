<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">os_gpu-v data paths</title>
  <desc id="desc">Control requests use gRPC, large H2D and D2H data use POSIX shared memory, and high-frequency launch, D2D and sync commands use a per-session SPSC ring.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 16; }
      .client { fill: #eff6ff; stroke: #60a5fa; }
      .server { fill: #f5f3ff; stroke: #a78bfa; }
      .data { fill: #ecfdf5; stroke: #22c55e; }
      .fast { fill: #fff7ed; stroke: #fb923c; }
      .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .title { font-size: 32px; font-weight: 800; }
      .label { font-size: 22px; font-weight: 800; }
      .small { font-size: 18px; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 17px; fill: #334155; }
      .muted { fill: #475569; }
      .line1 { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowBlue); }
      .line2 { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrowGreen); }
      .line3 { stroke: #ea580c; stroke-width: 3; fill: none; marker-end: url(#arrowOrange); }
    </style>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/></marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/></marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/></marker>
  </defs>

  <rect class="bg" width="1180" height="560"/>
  <text x="54" y="58" class="text title">Control path, data path and fast path</text>
  <text x="56" y="88" class="text muted small">The implementation separates structured control, bulk data movement and high-frequency commands.</text>

  <rect x="70" y="128" width="1040" height="95" class="lane"/>
  <rect x="100" y="152" width="220" height="48" class="client" rx="10"/>
  <text x="126" y="183" class="text mono">CreateSession / Malloc</text>
  <path class="line1" d="M335 176 C500 176 635 176 800 176"/>
  <rect x="820" y="152" width="250" height="48" class="server" rx="10"/>
  <text x="846" y="183" class="text mono">gRPC service handler</text>
  <text x="102" y="250" class="text label">1. gRPC control path</text>
  <text x="102" y="278" class="text muted small">Low-frequency structured requests: session, allocation, free, module registration and metadata.</text>

  <rect x="70" y="302" width="1040" height="95" class="lane"/>
  <rect x="100" y="326" width="250" height="48" class="data" rx="10"/>
  <text x="126" y="357" class="text mono">H2D / D2H payload</text>
  <path class="line2" d="M365 350 C510 350 650 350 795 350"/>
  <rect x="820" y="326" width="250" height="48" class="data" rx="10"/>
  <text x="846" y="357" class="text mono">POSIX shm arena</text>
  <text x="102" y="424" class="text label">2. Shared-memory data path</text>
  <text x="102" y="452" class="text muted small">Bulk host-device data is passed through shared memory blocks instead of protobuf byte fields.</text>

  <rect x="70" y="478" width="1040" height="62" class="lane"/>
  <rect x="100" y="492" width="260" height="36" class="fast" rx="9"/>
  <text x="126" y="516" class="text mono">launch / D2D / sync</text>
  <path class="line3" d="M375 510 C515 510 650 510 790 510"/>
  <rect x="820" y="492" width="250" height="36" class="fast" rx="9"/>
  <text x="846" y="516" class="text mono">SPSC ring worker</text>
  <text x="70" y="116" class="text label">Path split used by os_gpu-v</text>
</svg>
